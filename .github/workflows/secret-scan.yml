name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull secret scanner
        run: docker pull ghcr.io/kse-whatisyouralibi/custom-secret-detect:latest

      - name: Run secret scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/scan \
            ghcr.io/kse-whatisyouralibi/custom-secret-detect:latest \
            /scan/
